---
# inventories/prod/hosts.yml — Inventaire PRODUCTION.
#
# CLAUDE.md 5.1 : inventaire STRICTEMENT distinct de qual. Aucune valeur de prod
# atteignable depuis qual (et inversement). Ne jamais mutualiser un group_vars.
#
# Topologie enterprise (CLAUDE.md 3) : gateway x2, controller x2, hub x2, EDA x2,
# 1 hop node + 2 execution nodes, Redis cluster (6 nœuds colocalisés sur
# gateways/controllers/hubs), PostgreSQL EXTERNE (hors inventaire d'installation).
#
# STUB — livrable 1 : FQDN à renseigner (placeholders). Aucun secret ici.
#
# NOMS DE GROUPES — CONFIRMÉS pour ansible.containerized_installer (AAP 2.6
# containerized enterprise) : automationgateway, automationcontroller,
# automationhub, automationeda, execution_nodes, database, redis.
# Le groupe `database` existe mais reste VIDE ici (PostgreSQL externe géré DBA).
#
# CONFIRMÉ (source: bundle `inventory` enterprise + README.md) :
#   - hop node : `receptor_type='hop'` sur l'hôte, dans [execution_nodes]
#     (inventory L22). execution node = défaut `receptor_type=execution`
#     (README L735), non requis explicitement.
#   - noms de variables registry / bundle / PG / TLS / redis : voir la table de
#     résolution + aap-facts.md (mémoire repo). Appliqués en group_vars, livrable
#     dédié (pas ici).

all:
  children:

    # --- Plan de contrôle -----------------------------------------------------
    automationgateway:
      hosts:
        gw1.prod.example.com: {}    # placeholder FQDN
        gw2.prod.example.com: {}    # placeholder FQDN

    automationcontroller:
      hosts:
        ctrl1.prod.example.com: {}
        ctrl2.prod.example.com: {}

    automationhub:
      hosts:
        hub1.prod.example.com: {}
        hub2.prod.example.com: {}

    automationeda:
      hosts:
        eda1.prod.example.com: {}
        eda2.prod.example.com: {}

    # --- Plan d'exécution -----------------------------------------------------
    execution_nodes:
      hosts:
        hop1.prod.example.com:      # hop node
          receptor_type: hop        # CONFIRMÉ (bundle inventory L22 ; README L735)
        exec1.prod.example.com:
          receptor_type: execution  # défaut README L735 (explicite ici)
        exec2.prod.example.com:
          receptor_type: execution  # défaut README L735 (explicite ici)

    # --- Redis cluster --------------------------------------------------------
    # Redis en mode cluster, 6 nœuds colocalisés sur gateways + hubs + EDA
    # (source: bundle `inventory` enterprise L55-62). PAS sur les controllers,
    # PAS sur execution nodes, PAS sur la base.
    redis:
      hosts:
        gw1.prod.example.com: {}
        gw2.prod.example.com: {}
        hub1.prod.example.com: {}
        hub2.prod.example.com: {}
        eda1.prod.example.com: {}
        eda2.prod.example.com: {}

    # --- Base de données (externe) --------------------------------------------
    # PostgreSQL EXTERNE géré par l'équipe DBA (CLAUDE.md 3). En topologie
    # enterprise à base externe, l'exemple du bundle ne déclare AUCUN groupe
    # [database] (absent de `inventory` enterprise ; présent uniquement dans
    # `inventory-growth` L48, cas base colocalisée). La base se déclare donc
    # exclusivement via les variables *_pg_host en group_vars — pas de groupe ici.
