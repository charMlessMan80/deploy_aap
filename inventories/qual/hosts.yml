---
# inventories/qual/hosts.yml — Inventaire QUALIFICATION.
#
# CLAUDE.md 5.1 : inventaire STRICTEMENT distinct de prod. Aucune valeur de qual
# atteignable depuis prod (et inversement). Ne jamais mutualiser un group_vars.
#
# Topologie enterprise (CLAUDE.md 3) : identique en structure à la prod, mais
# FQDN et variables propres à la qualification. C'est ici (et SEULEMENT ici) que
# les variables de banc de test sont autorisées (verrouillées en prod, CLAUDE.md 5.2).
#
# STUB — livrable 1 : FQDN à renseigner (placeholders). Aucun secret ici.
#
# NOMS DE GROUPES — CONFIRMÉS pour ansible.containerized_installer (AAP 2.6
# containerized enterprise) : automationgateway, automationcontroller,
# automationhub, automationeda, execution_nodes, database, redis.
# Le groupe `database` existe mais reste VIDE ici (PostgreSQL externe géré DBA).
#
# CONFIRMÉ (source: bundle `inventory` enterprise + README.md) :
#   - hop node : `receptor_type='hop'` sur l'hôte, dans [execution_nodes]
#     (inventory L22). execution node = défaut `receptor_type=execution`
#     (README L735), non requis explicitement.
#   - noms de variables registry / bundle / PG / TLS / redis : voir la table de
#     résolution + aap-facts.md (mémoire repo). Appliqués en group_vars, livrable
#     dédié (pas ici).

all:
  children:

    # --- Plan de contrôle -----------------------------------------------------
    automationgateway:
      hosts:
        gw1.qual.example.com: {}    # placeholder FQDN
        gw2.qual.example.com: {}    # placeholder FQDN

    automationcontroller:
      hosts:
        ctrl1.qual.example.com: {}
        ctrl2.qual.example.com: {}

    automationhub:
      hosts:
        hub1.qual.example.com: {}
        hub2.qual.example.com: {}

    automationeda:
      hosts:
        eda1.qual.example.com: {}
        eda2.qual.example.com: {}

    # --- Plan d'exécution -----------------------------------------------------
    execution_nodes:
      hosts:
        hop1.qual.example.com:      # hop node
          receptor_type: hop        # CONFIRMÉ (bundle inventory L22 ; README L735)
        exec1.qual.example.com:
          receptor_type: execution  # défaut README L735 (explicite ici)
        exec2.qual.example.com:
          receptor_type: execution  # défaut README L735 (explicite ici)

    # --- Redis cluster --------------------------------------------------------
    # Redis en mode cluster, 6 nœuds colocalisés sur gateways + hubs + EDA
    # (source: bundle `inventory` enterprise L55-62). PAS sur les controllers,
    # PAS sur execution nodes, PAS sur la base.
    redis:
      hosts:
        gw1.qual.example.com: {}
        gw2.qual.example.com: {}
        hub1.qual.example.com: {}
        hub2.qual.example.com: {}
        eda1.qual.example.com: {}
        eda2.qual.example.com: {}

    # --- Base de données (externe) --------------------------------------------
    # PostgreSQL EXTERNE (DBA). Pas de groupe [database] en topologie enterprise
    # à base externe (absent de `inventory` enterprise ; présent seulement dans
    # `inventory-growth` L48). Déclaration via *_pg_host en group_vars uniquement.
