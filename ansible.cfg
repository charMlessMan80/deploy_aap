# ansible.cfg — configuration du dépôt aap-automation
#
# Rappel CLAUDE.md 5.4 : {{ playbook_dir }} se résout depuis le CWD, pas depuis
# l'emplacement de ce fichier. Les chemins ci-dessous sont donc relatifs au
# répertoire depuis lequel ansible est lancé (racine du dépôt attendue).

[defaults]
# Résolution des collections :
#  - ./collections : collections utilitaires éventuelles installées localement.
#  - le répertoire `collections/` du setup bundle AAP 2.6 EXTRAIT fournit
#    ansible.containerized_installer (NON dispo sur Galaxy, cf. requirements.yml).
# collections_path accepte une liste séparée par ':'. Adapter le second chemin au
# bundle extrait, présent sur les nœuds seed ET sur la machine de dev.
# CONFIRMÉ (source: `ansible-doc -l` résout la collection via ce chemin) :
# le répertoire `collections/` du bundle extrait fournit
# ansible.containerized_installer. Sur les nœuds seed, adapter au chemin réel du
# bundle extrait (ANSIBLE_COLLECTIONS_PATH ou cette entrée).
collections_path = ./collections:./bundles/ansible-automation-platform-containerized-setup-bundle-2.6-10.1-x86_64/collections
roles_path = ./roles

# Aucun inventaire par défaut : l'inventaire DOIT être passé explicitement en -i
# pour éviter tout mélange prod/qual accidentel (cf. CLAUDE.md 5.1).
inventory =

# Confort / lisibilité
host_key_checking = True
retry_files_enabled = False
# stdout_callback = yaml            # À VÉRIFIER : callback dispo selon version ansible-core

[privilege_escalation]
become = False                      # become géré au niveau des plays/tasks
