---
# roles/preflight/defaults/main.yml — Valeurs par défaut du rôle preflight.
#
# CLAUDE.md 5.6 : aucun secret ici. Les défauts sont surchargeables par
# group_vars/host_vars des inventaires prod/qual.

# Brique 1a — source OPTIONNELLE du PEM de CA à déposer à l'emplacement custom_ca_cert.
# Laissée non définie par défaut : si absente, le rôle se contente de VÉRIFIER la
# présence du fichier (il ne dépose rien). Définir pour activer le dépôt.
# À VÉRIFIER : source réelle du PEM (PKI d'entreprise non émise).
# preflight_ca_cert_src: /chemin/source/enterprise-ca.crt

# Brique 2 — enregistrement Satellite. Ces variables sont fournies par l'INVENTAIRE
# (group_vars), pas par le rôle (valeurs infra). Documentées ici pour mémoire ;
# NON définies en dur (chemins/IDs réels # À VÉRIFIER côté infra) :
#   satellite_server_hostname   # FQDN du Satellite            (# À VÉRIFIER)
#   satellite_org_id            # organisation Satellite       (# À VÉRIFIER)
#   satellite_activation_key    # AK (n'existe pas encore)     (# À VÉRIFIER)
#   satellite_ca_cert           # défaut /etc/rhsm/ca/katello-server-ca.pem
#   satellite_ca_src            # source de la CA à déposer     (# À VÉRIFIER)
#   satellite_ca_src_remote     # défaut false (source sur le seed)
#   satellite_manage_repos      # défaut false (l'AK porte généralement les repos)
#   satellite_repos             # IDs de repos si manage_repos  (# À VÉRIFIER)
#   satellite_force_register    # défaut false (idempotence)

# Brique 3 — paquets prérequis (justifiés, non gonflés) :
#   - ansible-core     : l'installeur ASSERTE sa version (preflight/core.yml), ne
#                        l'installe PAS => requis pré-installé.
#   - podman           : cible containerized rootless (l'installeur l'installe aussi
#                        sur non-ostree ; on l'assure présent en amont).
#   - python3-psycopg2 : requis par la brique 1b (ping PG) AVANT l'installeur.
# À VÉRIFIER : paquets additionnels selon la cible RHEL 9.6+/10 (les 3 noms ci-dessus
#   sont stables entre RHEL 9 et 10).
preflight_packages:
  - ansible-core
  - podman
  - python3-psycopg2

# Brique 4 — chrony (chemins/service ; surchargeable selon la cible RHEL).
preflight_chronyd_bin: /usr/sbin/chronyd
preflight_chrony_conf: /etc/chrony.conf
preflight_chrony_service: chronyd

# Brique 5 — SELinux (assert d'état, lecture seule).
# Mode SELinux exigé : VIDE par défaut = on n'impose pas un mode précis (la doc AAP
# 2.6 containerized consultée ne fonde pas 'enforcing' ; l'installeur ne fait aucun
# precheck). L'assert obligatoire reste « SELinux activé ». Passer cette variable à
# 'enforcing' (en group_vars/host_vars) pour l'imposer si l'organisation l'exige.
# À VÉRIFIER : AAP 2.6 containerized exige-t-il 'enforcing' ? (doc / support RH).
preflight_selinux_required_mode: ""

# Brique 7 — firewalld (assert d'état, lecture seule).
# État firewalld exigé : VIDE par défaut = non imposé (l'installeur gère les deux
# cas et n'exige pas firewalld enabled). Même nature que preflight_selinux_required_mode
# (politique d'assert du RÔLE preflight — consommateur unique => role default préfixé,
# §5.7 ; surchargeable en group_vars/host_vars). Passer à 'enabled' pour garantir que
# l'installeur ouvrira bien les ports composants.
preflight_firewalld_required_state: ""

# Brique 8 — stockage (asserts sur ansible_mounts ; AUCUNE opération de disque).
# Chemins sondés (techniques du rôle) :
preflight_graphroot_path: "{{ aap_user_home }}/aap/containers/storage"  # sourcé storage.conf.j2
# images_tmp_dir défaut = TMPDIR système = /tmp (bundle README, section Common ;
# confirmé doc RH « Temporary directory (defaults to /tmp) »).
preflight_bundle_tmp_path: /tmp
# Garde cœur sourcée (overlay pas sur NFS) — toujours active. Confirmée doc RH :
# « Podman does not support storing container images on an NFS share »
#   (System requirements, containerized ; cf. URL ci-dessous).
preflight_graphroot_forbid_nfs: true
#
# Seuils SOURCÉS (AAP 2.6 containerized, table « Local disk » per-VM — IDENTIQUE sur
# les deux pages officielles, une SEULE table pour TOUS les nœuds de la topo enterprise ;
# aucune différenciation par rôle publiée) :
#   - Container enterprise topology :
#     https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/plan-ref_cont_b_env_a
#   - Containerized System requirements :
#     https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/install-ref_cont_aap_system_requirements
# Table (per-VM) : Total 60 GB · Installation directory 15 GB · /var/tmp online 1 GB ·
#   /var/tmp offline/bundled 3 GB · TMPDIR (/tmp) offline/bundled 10 GB.
# Contexte projet = installation BUNDLE (offline) => on retient les valeurs bundled.
# Surchargeables par env ET par groupe (§5.7) si un besoin local supérieur est décidé.
preflight_aap_min_free_gb: 15          # « Installation directory: 15 GB » -> $HOME/aap
preflight_bundle_tmp_min_free_gb: 10   # « Temporary directory (/tmp) offline/bundled: 10 GB »
# NB /var/tmp (3 GB bundled) : exigence distincte NON modélisée ici (pas de variable
#   dédiée — périmètre figé) ; à couvrir par le provisioning du disque (Total 60 GB).
# NB hub : le surplus de stockage du hub porte sur le PARTAGE NFS de contenu (concern
#   séparé), pas sur le disque local d'installation => pas de défaut par groupe ici.
# FS : la doc RH ne pose AUCUNE exigence NI recommandation de type de FS (ni xfs ni ext4)
#   pour le disque local => on n'impose rien. Passer 'xfs' en group_vars si l'organisation
#   l'exige (l'assert ne mord que si la variable est non vide).
preflight_storage_required_fstype: ""

# Brique 6 — prérequis NFS du hub (test d'atteignabilité ; PAS de montage).
preflight_nfs_port: 2049
preflight_nfs_probe_timeout: 10

# Brique 3 — utilisateur applicatif Podman rootless.
# aap_user / aap_group / aap_user_home / aap_user_shell sont définis en group_vars/all
# (projet-wide, même valeur prod et qual) et NON ici : ce sont des faits d'inventaire
# consommés par plusieurs briques et par le contexte de l'installeur, pas des défauts
# propres au rôle. (Aussi : var-naming exige un préfixe de rôle pour les vars du rôle.)
